[General]
log_level = INFO
max_threads = 50
timeout_seconds = 5
requests_per_thread = 4000

[Simulator]
; HTTP_FLOOD targets application layer (hardest to detect/block, most realistic)
; SYN_FLOOD targets network layer (requires raw sockets, needs root)
; SLOWLORIS holds connections open slowly (effective against Apache/IIS)
attack_type = HTTP_FLOOD
duration_seconds = 60
ramp_up_seconds = 10

[Reporting]
; Status codes considered "blocked" by server defenses
blocked_codes = 403,429,503,429
show_per_request_log = true
summary_on_exit = true